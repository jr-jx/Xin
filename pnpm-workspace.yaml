    date-fns: ^4.1.0
    fast-xml-parser: ^5.7.2
    parse-domain: ^8.3.0
    pinia: ^3.0.4
    radash: ^12.1.1
    unplugin-yaml: ^4.2.0

onlyBuiltDependencies:
