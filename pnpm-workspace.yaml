  framework:
    '@types/node': ^25.6.0
    nuxt: ^4.4.2
    sass-embedded: ^1.99.0
    typescript: ^6.0.3
    vue: ^3.5.33
    vue-router: ^5.0.6
  quality:
    '@antfu/eslint-config': ^8.2.0
    '@nuxt/eslint': ^1.15.2
    '@zinkawaii/stylelint-config': ^0.4.0
    eslint: ^9.39.4
